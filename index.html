<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BoredOS</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #2b2b2b;
    }
    .box {
      text-align: center;
      padding: 40px 60px;
      background: #212121;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    h1 { font-size: 22px; color: #ffffff; margin-bottom: 8px; }
    p  { color: #666; font-size: 14px; }
    .green { color: #2a9d2a; font-weight: bold; }
  </style>
</head>
<body>
  <div class="box">
    <h1>BoredOS Web Server</h1>
    <p><span class="green">✓ Your webserver is running properly.</span></p>
    <p>BoredOS httpd is online and serving requests.</p>
  </div>
</body>
</html>
